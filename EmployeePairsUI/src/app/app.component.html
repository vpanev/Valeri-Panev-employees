<div class="container">
  <div class="title">
    <h1>Employee Pairs App</h1>
  </div>
  <form [formGroup]="uploadForm" enctype='multipart/form-data' (ngSubmit)="uploadFile()" class="upload-form">
    <div class="upload-file-input">
      <input type="file" name="file" (change)="onFileSelected($event)" class="inputfile" />
      <button type="submit">Submit</button>
    </div>
  </form>

  <table mat-table class="dataTable-table" [dataSource]="dataSource">
    <ng-container matColumnDef="employeeID1">
      <th mat-header-cell *matHeaderCellDef> EmployeeID1 </th>
      <td mat-cell *matCellDef="let element"> {{element.employeeID1}} </td>
    </ng-container>
    <ng-container matColumnDef="employeeID2">
      <th mat-header-cell *matHeaderCellDef> EmployeeID2 </th>
      <td mat-cell *matCellDef="let element"> {{element.employeeID2}} </td>
    </ng-container>
    <ng-container matColumnDef="projectID">
      <th mat-header-cell *matHeaderCellDef> ProjectID </th>
      <td mat-cell *matCellDef="let element"> {{element.projectID}} </td>
    </ng-container>
    <ng-container matColumnDef="workedTimeTogether">
      <th mat-header-cell *matHeaderCellDef> WorkedTimeTogether </th>
      <td mat-cell *matCellDef="let element"> {{element.workedTimeTogether}} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
